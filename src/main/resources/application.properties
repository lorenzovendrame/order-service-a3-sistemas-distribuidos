spring.application.name=Order-Service
server.port=${SERVER_PORT:8080}
spring.profiles.active=${PROFILE}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.mapper-locations=classpath:repository/**/*.xml
mybatis.type-handlers-package=com.lorenzovendrame.orderservice.config
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
custom.aws.access-key=${AWS_ACCESS_KEY_ID}
custom.aws.secret-key=${AWS_SECRET_ACCESS_KEY}
custom.aws.session-token=${AWS_SESSION_TOKEN}
app.jwt.secret=${JWT_SECRET}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=order-service